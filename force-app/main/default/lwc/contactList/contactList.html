<template>
     <lightning-card>
        <div class="slds-grid slds-align-center slds-justify-between slds-p-horizontal_medium slds-p-vertical_small">
            <!-- Title centered -->
<h1 class="slds-text-heading_x-large slds-text-align_center slds-grow slds-text-title_bold">
    Follow-Up Dashboard
</h1>        
            <!-- Refresh icon aligned right -->
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refresh"
                title="Refresh"
                onclick={handleRefresh}>
            </lightning-button-icon>
        </div>
        <template if:true={isLoading}>
            <div class="slds-p-around_medium slds-text-align_center">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

    <template if:true={contacts.length}>

        <table class="slds-table slds-table_cell-buffer slds-table_bordered">
            
            <thead>
                <tr>
                    <th>Contact Name</th>
                    <th>Due Date</th>
                    <th>Notes</th>
                    <th>Action</th>
                </tr>
            </thead>

            
            <tbody>
                <template for:each={contacts} for:item="con">
                    <tr key={con.Id}>
                        
                       
                <td>
    <a href="javascript:void(0);" 
       data-id={con.Id} 
       onclick={handleNavigate}>
        {con.Name}
    </a>
</td>
                        
                        <td>{con.Follow_Up_Due_Date__c}</td>

                       
                        <td>
                            <lightning-input 
                                type="text"
                                variant="label-hidden"
                                placeholder="Enter notes"
                                data-id={con.Id}
                                onchange={handleNotes}>
                            </lightning-input>
                        </td>

                        <td>
                            <lightning-button 
                                variant="brand"
                                label="Mark Completed"
                                data-id={con.Id}
                                onclick={handleComplete}>
                            </lightning-button>
                        </td>

                    </tr>
                </template>
            </tbody>

        </table>

    </template>

    <template if:false={contacts.length}>
               <table class="slds-table slds-table_cell-buffer slds-table_bordered">
            
            <thead>
                <tr>
                    <th>Contact Name</th>
                    <th>Due Date</th>
                    <th>Notes</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td colspan="4" style="text-align:center;">
                        No pending follow-ups.
                    </td>
                </tr>
            </tbody>

        </table>
    </template>
    </lightning-card>
</template>
